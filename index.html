<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kegiatan Harian</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Kegiatan Harian</h1>

<form id="formKegiatan">

<input type="date" id="tanggal" required>

<input type="text" id="kegiatan" placeholder="Nama kegiatan" required>

<input type="text" id="lokasi" placeholder="Lokasi kegiatan">

<textarea id="keterangan" placeholder="Keterangan"></textarea>

<button type="submit">Simpan</button>

</form>

<div id="notif"></div>

</div>

<script src="script.js"></script>

</body>
</html>
