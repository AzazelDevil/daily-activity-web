<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Dashboard Kegiatan Harian</title>
<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h2>Dashboard Kegiatan Harian</h2>

</header>

<div class="container">

<div class="card">

<h3>Tambah Kegiatan</h3>

<input type="date" id="tanggal">

<input type="text" id="kegiatan" placeholder="Nama kegiatan">

<input type="text" id="lokasi" placeholder="Lokasi kegiatan">

<button onclick="tambahData()">Simpan</button>

</div>



<div class="grid">

<div class="card">

<div>Total Hari Ini</div>
<div class="stat" id="today">0</div>

</div>

<div class="card">

<div>Total Minggu Ini</div>
<div class="stat" id="week">0</div>

</div>

<div class="card">

<div>Total Bulan Ini</div>
<div class="stat" id="month">0</div>

</div>

</div>



<div class="card">

<h3>Data Kegiatan</h3>

<table>

<thead>

<tr>
<th>Tanggal</th>
<th>Kegiatan</th>
<th>Lokasi</th>
<th>Aksi</th>
</tr>

</thead>

<tbody id="tableData"></tbody>

</table>

</div>

</div>

<div class="toast" id="toast"></div>

<script src="script.js"></script>

</body>

</html>
